<svg viewBox="0 0 96 96" width="96" height="136" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Signal waves -->
  <circle cx="48" cy="18" r="25" fill="none" stroke="url(#waveGradient)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="48" cy="18" r="35" fill="none" stroke="url(#waveGradient)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Main tower pole -->
  <rect x="45" y="20" width="6" height="55" fill="url(#towerGradient)" rx="1"/>
  
  <!-- Tower top section -->
  <rect x="42" y="15" width="12" height="8" fill="#1e40af" rx="1"/>
  
  <!-- Tower base -->
  <rect x="30" y="75" width="36" height="5" fill="url(#towerGradient)" rx="1"/>
  
  <!-- Top beacon light -->
  <circle cx="48" cy="16" r="2" fill="#ffd000"/>
  <circle cx="48" cy="16" r="3" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
</svg>