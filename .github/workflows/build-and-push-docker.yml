name: Build and Push Docker Images

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME_APP: contenttower

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata (app image)
      id: meta-app
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_APP }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha,format=short,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
    
    - name: Build and push contenttower image
      uses: docker/build-push-action@v5
      with:
        context: ./ContentTower
        file: ./ContentTower/Dockerfile
        push: true
        tags: ${{ steps.meta-app.outputs.tags }}
        labels: ${{ steps.meta-app.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
